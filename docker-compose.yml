name: ra

services:
  postgres:
    image: postgres:16-alpine
    container_name: ra-postgres
    restart: unless-stopped
    ports:
      - "14002:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ra
    volumes:
      - ra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ra"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ra-mailhog
    restart: unless-stopped
    ports:
      - "14011:1025"
      - "14012:8025"

  minio:
    image: minio/minio:latest
    container_name: ra-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "14007:9000"
      - "14008:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - ra_minio_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: ra-nginx
    restart: unless-stopped
    ports:
      - "14009:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - minio

  redis:
    image: redis:7-alpine
    container_name: ra-redis
    restart: unless-stopped
    ports:
      - "14006:6379"
    volumes:
      - ra_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ra-rabbitmq
    restart: unless-stopped
    ports:
      - "14004:5672"
      - "14005:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ra_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ra-app
    restart: unless-stopped
    ports:
      - "14001:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ra?schema=public
      AUTH_URL: http://localhost:14001
      NEXT_PUBLIC_APP_URL: http://localhost:14001
      PORT: "3000"
      WATCHPACK_POLLING: "true"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_PUBLIC_URL: http://localhost:14007
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      WORKER_API_TOKEN: ${WORKER_API_TOKEN:-ra-dev-worker-token}
    volumes:
      - .:/app
      - ra_node_modules:/app/node_modules
      - ra_next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh docker/entrypoint.dev.sh

  worker:
    build:
      context: .
      dockerfile: worker/WorkerServiceRaMedia/Dockerfile
    container_name: ra-worker
    restart: unless-stopped
    environment:
      ConnectionStrings__Redis: redis:6379,abortConnect=false,connectRetry=3,connectTimeout=5000,syncTimeout=5000,keepAlive=60
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      RabbitMQ__VirtualHost: /
      RabbitMQ__ExchangeName: media-transcode-exchange
      RabbitMQ__QueueName: media-transcode-jobs
      RabbitMQ__RoutingKey: media.transcode
      Storage__Endpoint: minio
      Storage__Port: "9000"
      Storage__UseSSL: "false"
      Storage__AccessKey: minio
      Storage__SecretKey: miniosecret
      Storage__Bucket: ra-media
      Media__PublicBaseUrl: http://localhost:14009
      WorkerApi__BaseUrl: http://app:3000
      WorkerApi__Token: ${WORKER_API_TOKEN:-ra-dev-worker-token}
      Observability__Prometheus__Enabled: "true"
      Observability__Prometheus__Port: "14010"
    ports:
      - "14010:14010"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
      minio:
        condition: service_started

volumes:
  ra_postgres_data:
  ra_minio_data:
  ra_redis_data:
  ra_rabbitmq_data:
  ra_node_modules:
  ra_next_cache:
