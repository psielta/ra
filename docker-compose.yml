name: ra

services:
  postgres:
    image: postgres:16-alpine
    container_name: ra-postgres
    restart: unless-stopped
    ports:
      - "14002:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ra
    volumes:
      - ra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ra"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: ra-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "14007:9000"
      - "14008:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - ra_minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: ra-redis
    restart: unless-stopped
    ports:
      - "14006:6379"
    volumes:
      - ra_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ra-app
    restart: unless-stopped
    ports:
      - "14001:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ra?schema=public
      AUTH_URL: http://localhost:14001
      NEXT_PUBLIC_APP_URL: http://localhost:14001
      PORT: "3000"
      WATCHPACK_POLLING: "true"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_PUBLIC_URL: http://localhost:14007
    volumes:
      - .:/app
      - ra_node_modules:/app/node_modules
      - ra_next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
    command: sh docker/entrypoint.dev.sh

volumes:
  ra_postgres_data:
  ra_minio_data:
  ra_redis_data:
  ra_node_modules:
  ra_next_cache: